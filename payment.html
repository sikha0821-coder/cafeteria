<!DOCTYPE html>
<html>
    <head>
        <title>payment page</title>
        <link rel="stylesheet" href="payment.style.css">
    </head>
    <body>
        <div class="container">
            <h2>payment</h2>
            <form onsubmit="return validate()">
                <div class="card-icon">
                    <img src="https://img.icons8.com/color/48/visa.png">
                    <img src="https://img.icons8.com/color/48/mastercard.png">
                </div>
                

                <input type="text" id="card"
                 placeholder="card number" required><br>
                <input type="text" 
                placeholder="card holder name" required><br>

                <div class="row">
                    <input type="text" placeholder="MM/YY" maxlength="5">
                    <input type="text" id="cvv" placeholder="cvv">
                </div>
                <div class="upi">
                    <input type="text" placeholder="UPI ID (examole@upi)">
                </div>
                <div class="order">
                    <b>order summary</b>
                    <p>product: food name </p>
                    <p>price:   &#8377 82</p>
                    <p>quantity: 2</p>
                    <p>tax :18</p>
                    <hr>
                    <b>total : 100</b>
                </div>
                 
                <button type="submit">pay now</button>
            </form>
            <div class="qr">
                <p>scan QR to pay</p>
                <img src="D:\qr code.jpeg">
            </div>
        </div>
        <div class="popup" id="success">
            <h2>payment successfull✅</h2>
            <p>your order placed successfully</p>
            <button onclick=" popup()">ok</button>
        </div>

        
        
    </body>
</html>
